name: Publish hexarchproof-sdk to PyPI

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish-pypi:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build sdist and wheel
        working-directory: packages/python-sdk
        run: python -m build

      - name: Publish to PyPI (trusted publisher when available)
        id: oidc_publish
        continue-on-error: true
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/python-sdk/dist/

      - name: Publish to PyPI (token fallback)
        if: ${{ steps.oidc_publish.outcome != 'success' }}
        working-directory: packages/python-sdk
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
          TWINE_REPOSITORY_URL: https://upload.pypi.org/legacy/
        run: python -m twine upload dist/*

      - name: Announce PyPI publish to Discord
        if: ${{ success() }}
        shell: bash
        env:
          WEBHOOKS: ${{ secrets.DISCORD_ANNOUNCEMENT_WEBHOOK_URLS }}
        run: |
          if [[ -z "${WEBHOOKS}" ]]; then
            echo "No DISCORD_ANNOUNCEMENT_WEBHOOK_URLS configured; skipping announcement."
            exit 0
          fi

          MESSAGE="✅ Published hexarchproof-sdk to PyPI from ${GITHUB_REPOSITORY}@${GITHUB_SHA}."
          while IFS= read -r url; do
            [[ -z "${url}" ]] && continue
            curl -sS -X POST -H "Content-Type: application/json" -d "{\"content\":\"${MESSAGE}\"}" "${url}" >/dev/null
          done < <(echo "${WEBHOOKS}" | tr ',;' '\n')
