name: Publish hexarchproof-sdk to PyPI

on:
  workflow_dispatch:
  push:
    tags:
      - "pypi-v*.*.*"
      - "v*.*.*"

permissions:
  contents: read
  id-token: write

jobs:
  publish-pypi:
    runs-on: ubuntu-latest
    env:
      HAS_TWINE_PASSWORD: ${{ secrets.TWINE_PASSWORD != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build sdist and wheel
        working-directory: packages/python-sdk
        run: python -m build

      - name: Publish to PyPI (OIDC trusted publisher)
        if: ${{ env.HAS_TWINE_PASSWORD != 'true' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/python-sdk/dist/

      - name: Publish to PyPI (Twine credentials)
        if: ${{ env.HAS_TWINE_PASSWORD == 'true' }}
        env:
          TWINE_USERNAME: ${{ secrets.TWINE_USERNAME }}
          TWINE_PASSWORD: ${{ secrets.TWINE_PASSWORD }}
          TWINE_REPOSITORY_URL: ${{ secrets.TWINE_REPOSITORY_URL }}
        run: |
          TWINE_USERNAME="${TWINE_USERNAME:-__token__}" \
          TWINE_REPOSITORY_URL="${TWINE_REPOSITORY_URL:-https://upload.pypi.org/legacy/}" \
          python -m twine upload --repository-url "${TWINE_REPOSITORY_URL}" packages/python-sdk/dist/*

      - name: Announce PyPI publish to Discord
        shell: bash
        env:
          WEBHOOKS: ${{ secrets.DISCORD_ANNOUNCEMENT_WEBHOOK_URLS }}
        run: |
          if [[ -z "${WEBHOOKS}" ]]; then
            echo "DISCORD_ANNOUNCEMENT_WEBHOOK_URLS not configured; skipping Discord announcement."
            exit 0
          fi
          MESSAGE="✅ Published hexarchproof-sdk to PyPI from ${GITHUB_REPOSITORY}@${GITHUB_SHA}."
          while IFS= read -r url; do
            [[ -z "${url}" ]] && continue
            curl -sS -X POST -H "Content-Type: application/json" -d "{\"content\":\"${MESSAGE}\"}" "${url}" >/dev/null
          done < <(echo "${WEBHOOKS}" | tr ',;' '\n')
