name: Publish Hexarch Domain VS Code Extension

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: "SemVer bump (major|minor|patch). Leave empty to publish current version."
        required: false
        default: ""
  push:
    tags:
      - "extension-v*.*.*"

permissions:
  id-token: write
  contents: read

jobs:
  publish-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install workspace dependencies
        run: npm install
      - name: Compile SDK
        working-directory: packages/sdk
        run: npm run compile
      - name: Compile extension
        working-directory: packages/vscode-extension
        run: npm run compile
      - name: Install vsce
        run: npm install -g @vscode/vsce
      - name: Azure login (OIDC / Entra managed identity)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Publish extension
        working-directory: packages/vscode-extension
        shell: bash
        run: |
          BASE="https://raw.githubusercontent.com/${{ github.repository }}/main/packages/vscode-extension"
          BUMP="${{ inputs.version_bump }}"
          if [[ -n "${BUMP}" ]]; then
            vsce publish "${BUMP}" --azure-credential --base-content-url "${BASE}" --base-images-url "${BASE}"
          else
            vsce publish --azure-credential --base-content-url "${BASE}" --base-images-url "${BASE}"
          fi
