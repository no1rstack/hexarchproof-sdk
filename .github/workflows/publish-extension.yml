name: Publish Hexarch Domain VS Code Extension

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version_bump:
        description: "SemVer bump (major|minor|patch) passed to vsce publish. Leave empty to publish current version."
        required: false
        default: ""

permissions:
  contents: read

jobs:
  publish-extension:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install workspace dependencies
        run: npm install

      - name: Compile SDK
        run: npm run compile
        working-directory: packages/sdk

      - name: Compile extension
        run: npm run compile
        working-directory: packages/vscode-extension

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Publish extension (VSCE_PAT)
        working-directory: packages/vscode-extension
        shell: bash
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          BASE_CONTENT="https://raw.githubusercontent.com/${{ github.repository }}/main/packages/vscode-extension"
          BASE_IMAGES="${BASE_CONTENT}"
          BUMP="${{ github.event.inputs.version_bump || '' }}"

          if [[ -z "${VSCE_PAT}" ]]; then
            echo "VSCE_PAT secret is not configured."
            exit 1
          fi

          if [[ -n "${BUMP}" ]]; then
            vsce publish "${BUMP}" \
              --pat "${VSCE_PAT}" \
              --base-content-url "${BASE_CONTENT}" \
              --base-images-url "${BASE_IMAGES}"
          else
            vsce publish \
              --pat "${VSCE_PAT}" \
              --base-content-url "${BASE_CONTENT}" \
              --base-images-url "${BASE_IMAGES}"
          fi

      - name: Announce VS Code extension publish to Discord
        if: ${{ success() }}
        shell: bash
        env:
          WEBHOOKS: ${{ secrets.DISCORD_ANNOUNCEMENT_WEBHOOK_URLS }}
        run: |
          if [[ -z "${WEBHOOKS}" ]]; then
            echo "No DISCORD_ANNOUNCEMENT_WEBHOOK_URLS configured; skipping announcement."
            exit 0
          fi

          MESSAGE="✅ Published hexarch-domain VS Code extension from ${GITHUB_REPOSITORY}@${GITHUB_SHA}."
          while IFS= read -r url; do
            [[ -z "${url}" ]] && continue
            curl -sS -X POST -H "Content-Type: application/json" -d "{\"content\":\"${MESSAGE}\"}" "${url}" >/dev/null
          done < <(echo "${WEBHOOKS}" | tr ',;' '\n')
