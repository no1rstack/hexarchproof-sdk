name: Publish @hexarchproof/sdk to npm

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: "SemVer bump (major|minor|patch). Leave empty to publish current version."
        required: false
        default: ""
  push:
    tags:
      - "sdk-v*.*.*"
      - "v*.*.*"

permissions:
  contents: read
  id-token: write  # required for OIDC provenance

jobs:
  publish-sdk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install workspace dependencies
        run: npm install

      - name: Compile SDK
        run: npm run compile
        working-directory: packages/sdk

      - name: Bump version (optional)
        if: ${{ inputs.version_bump != '' }}
        working-directory: packages/sdk
        run: npm version ${{ inputs.version_bump }} --no-git-tag-version

      - name: Publish to npm with provenance
        working-directory: packages/sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public

      - name: Announce npm publish to Discord
        if: ${{ success() && secrets.DISCORD_ANNOUNCEMENT_WEBHOOK_URLS != '' }}
        shell: bash
        env:
          WEBHOOKS: ${{ secrets.DISCORD_ANNOUNCEMENT_WEBHOOK_URLS }}
        run: |
          MESSAGE="✅ Published @hexarchproof/sdk to npm from ${GITHUB_REPOSITORY}@${GITHUB_SHA}."
          while IFS= read -r url; do
            [[ -z "${url}" ]] && continue
            curl -sS -X POST -H "Content-Type: application/json" -d "{\"content\":\"${MESSAGE}\"}" "${url}" >/dev/null
          done < <(echo "${WEBHOOKS}" | tr ',;' '\n')
