name: Publish @hexarchproof/sdk to npm

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version_bump:
        description: "SemVer bump (major|minor|patch). Leave empty to publish current version."
        required: false
        default: ""

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish-sdk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install workspace dependencies
        run: npm install

      - name: Compile SDK
        run: npm run compile
        working-directory: packages/sdk

      - name: Bump version (optional)
        working-directory: packages/sdk
        shell: bash
        run: |
          BUMP="${{ github.event.inputs.version_bump || '' }}"
          if [[ -n "${BUMP}" ]]; then
            npm version "${BUMP}" --no-git-tag-version
          else
            echo "No version bump requested; using package.json version."
          fi

      - name: Publish to npm with provenance
        working-directory: packages/sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public

      - name: Announce npm publish to Discord
        if: ${{ success() }}
        shell: bash
        env:
          WEBHOOKS: ${{ secrets.DISCORD_ANNOUNCEMENT_WEBHOOK_URLS }}
        run: |
          if [[ -z "${WEBHOOKS}" ]]; then
            echo "No DISCORD_ANNOUNCEMENT_WEBHOOK_URLS configured; skipping announcement."
            exit 0
          fi

          MESSAGE="✅ Published @hexarchproof/sdk to npm from ${GITHUB_REPOSITORY}@${GITHUB_SHA}."
          while IFS= read -r url; do
            [[ -z "${url}" ]] && continue
            curl -sS -X POST -H "Content-Type: application/json" -d "{\"content\":\"${MESSAGE}\"}" "${url}" >/dev/null
          done < <(echo "${WEBHOOKS}" | tr ',;' '\n')
