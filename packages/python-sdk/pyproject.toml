[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "hexarchproof-sdk"
version = "0.0.2"
description = "Python SDK for Hexarch Deterministic Reproduction Proofs (DRP). Same input → same hash → same proof, anchored for independent verification."
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "Noir Stack LLC", email = "info@noirstack.com" }]
keywords = [
    "hexarch", "drp", "deterministic", "reproducibility",
    "verifiable-compute", "proof", "auditability", "noirstack",
    "canonical-json", "sha256",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Security :: Cryptography",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
requires-python = ">=3.11"
dependencies = ["canonicaljson>=2.0.0"]

[project.urls]
Homepage = "https://hexarch.systems/"
Repository = "https://github.com/no1rstack/hexarchproof-sdk"
"Bug Tracker" = "https://noirstack.com/support"

[tool.setuptools.packages.find]
where = ["src"]
